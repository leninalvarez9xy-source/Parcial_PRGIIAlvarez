<!DOCTYPE html>
<html>
<head>
    <title>Panel Principal</title>

    <style>

        body{
            font-family: Arial;
            background:#f4f4f4;

            display:flex;
            justify-content:center;
            align-items:center;

            height:100vh;

            margin:0;
        }

        .contenedor{

            width:350px;

            background:white;

            padding:30px;

            border:1px solid #ccc;

            text-align:center;
        }

        h1{
            margin-bottom:20px;
        }

        button{

            width:150px;

            padding:10px;

            margin-top:10px;

            cursor:pointer;
        }

    </style>

</head>

<body>

<div class="contenedor">

    <h1>Panel Principal</h1>

    <a href="/buscador">
        <button>
            Buscar Productos
        </button>
    </a>

    <br>

    <a href="/logout">
        <button>
            Salir
        </button>
    </a>

</div>

</body>
</html>
