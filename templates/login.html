<!DOCTYPE html>
<html>
<head>
    <title>Ingreso</title>

    <style>

        body{
            font-family: Arial;
            background:#f4f4f4;

            display:flex;
            justify-content:center;
            align-items:center;

            height:100vh;

            margin:0;
        }

        .formulario{

            width:350px;

            background:white;

            padding:30px;

            border:1px solid #ccc;

            text-align:center;
        }

        h1{
            margin-bottom:25px;
        }

        label{

            display:block;

            text-align:left;

            margin-top:15px;

            margin-bottom:5px;
        }

        input{

            width:100%;

            padding:10px;

            box-sizing:border-box;
        }

        button{

            margin-top:20px;

            padding:10px 20px;
        }

    </style>

</head>

<body>

<div class="formulario">

    <h1>Ingreso</h1>

    <label>Usuario</label>

    <input
    type="text"
    id="usuario"
    required>

    <label>Contraseña</label>

    <input
    type="password"
    id="password"
    required>

    <button onclick="login()">
        Entrar
    </button>

</div>

<script>

const API =
"https://parcial-prgiialvarez.onrender.com";

async function login(){

    let usuario =
    document.getElementById("usuario").value;

    let password =
    document.getElementById("password").value;

    let respuesta =
    await fetch(
        API + "/api/login",
        {
            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({
                usuario:usuario,
                password:password
            })
        }
    );

    let data =
    await respuesta.json();

    if(data.success){

        window.location.href =
        "principal.html";

    }else{

        alert("Usuario o contraseña incorrectos");

    }

}

</script>

</body>
</html>
